<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- Vintage film color scheme: black/dark grey borders with sprocket holes -->
  
  <!-- Left film border -->
  <rect x="0" y="0" width="70" height="600" fill="#141414" />
  
  <!-- Right film border -->
  <rect x="730" y="0" width="70" height="600" fill="#141414" />
  
  <!-- Top film border -->
  <rect x="70" y="0" width="660" height="45" fill="#141414" />
  
  <!-- Bottom film border -->
  <rect x="70" y="555" width="660" height="45" fill="#141414" />
  
  <!-- Sprocket Holes on Left -->
  <!-- We'll draw 10 sprocket slots (rounded rectangles) -->
  <g fill="#0e0e0e" stroke="#2a2a2a" stroke-width="1">
    <rect x="25" y="25" width="20" height="35" rx="4" />
    <rect x="25" y="85" width="20" height="35" rx="4" />
    <rect x="25" y="145" width="20" height="35" rx="4" />
    <rect x="25" y="205" width="20" height="35" rx="4" />
    <rect x="25" y="265" width="20" height="35" rx="4" />
    <rect x="25" y="325" width="20" height="35" rx="4" />
    <rect x="25" y="385" width="20" height="35" rx="4" />
    <rect x="25" y="445" width="20" height="35" rx="4" />
    <rect x="25" y="505" width="20" height="35" rx="4" />
    <rect x="25" y="565" width="20" height="35" rx="4" />
  </g>
  
  <!-- Sprocket Holes on Right -->
  <g fill="#0e0e0e" stroke="#2a2a2a" stroke-width="1">
    <rect x="755" y="25" width="20" height="35" rx="4" />
    <rect x="755" y="85" width="20" height="35" rx="4" />
    <rect x="755" y="145" width="20" height="35" rx="4" />
    <rect x="755" y="205" width="20" height="35" rx="4" />
    <rect x="755" y="265" width="20" height="35" rx="4" />
    <rect x="755" y="325" width="20" height="35" rx="4" />
    <rect x="755" y="385" width="20" height="35" rx="4" />
    <rect x="755" y="445" width="20" height="35" rx="4" />
    <rect x="755" y="505" width="20" height="35" rx="4" />
    <rect x="755" y="565" width="20" height="35" rx="4" />
  </g>
  
  <!-- Film Roll Brand Markings and Frames -->
  <text x="400" y="30" fill="#cc8b3c" font-family="'Courier New', Courier, monospace" font-size="14" font-weight="bold" letter-spacing="4" text-anchor="middle">
    KODAK RETRO 400
  </text>
  
  <text x="400" y="580" fill="#cc8b3c" font-family="'Courier New', Courier, monospace" font-size="14" font-weight="bold" letter-spacing="4" text-anchor="middle">
    ISO 400 / 27 DIN
  </text>
  
  <!-- Frame number text -->
  <text x="90" y="30" fill="#cc8b3c" font-family="monospace" font-size="14">► 21A</text>
  <text x="90" y="580" fill="#cc8b3c" font-family="monospace" font-size="14">21</text>
  <text x="700" y="30" fill="#cc8b3c" font-family="monospace" font-size="14">S-700</text>
  
  <!-- Inner film edge frame border -->
  <rect x="68" y="43" width="664" height="514" fill="none" stroke="#222" stroke-width="2" />
  
  <!-- Camera Crosshairs in Center (extremely subtle) -->
  <g stroke="#ffffff" stroke-width="1.5" opacity="0.25">
    <!-- Center reticle -->
    <circle cx="400" cy="300" r="15" fill="none" />
    <line x1="400" y1="280" x2="400" y2="270" />
    <line x1="400" y1="320" x2="400" y2="330" />
    <line x1="380" y1="300" x2="370" y2="300" />
    <line x1="420" y1="300" x2="430" y2="300" />
    
    <!-- Corners guides -->
    <path d="M 120 120 L 120 100 L 140 100" fill="none" />
    <path d="M 680 120 L 680 100 L 660 100" fill="none" />
    <path d="M 120 480 L 120 500 L 140 500" fill="none" />
    <path d="M 680 480 L 680 500 L 660 500" fill="none" />
  </g>
  
  <!-- Retro Orange LED Date Stamp (Bottom Right) -->
  <g transform="translate(620, 520)" opacity="0.85">
    <text x="0" y="0" fill="#ff4d00" font-family="'Courier New', Courier, monospace" font-size="18" font-weight="900" style="filter: drop-shadow(0px 0px 4px rgba(255, 77, 0, 0.8))">
      26  6 25
    </text>
  </g>
</svg>
